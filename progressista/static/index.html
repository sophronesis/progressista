<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Progressista Dashboard</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <style>
      :root {
        color-scheme: light dark;
        font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
        background: #f6f8fb;
        color: #1b1f24;
      }
      body {
        margin: 0;
        background: inherit;
        color: inherit;
      }
      header {
        padding: 1.5rem 2rem 1rem;
        display: flex;
        align-items: baseline;
        justify-content: space-between;
        gap: 1rem;
      }
      h1 {
        font-size: 1.6rem;
        margin: 0;
      }
      #status {
        font-size: 0.9rem;
        opacity: 0.7;
      }
      main {
        padding: 0 2rem 2.5rem;
        max-width: 1040px;
        margin: 0 auto;
        display: flex;
        flex-direction: column;
        gap: 2rem;
      }
      .toolbar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 1rem;
        flex-wrap: wrap;
      }
      .toolbar-buttons {
        display: flex;
        gap: 0.75rem;
        flex-wrap: wrap;
      }
      button {
        border: none;
        border-radius: 999px;
        padding: 0.45rem 1rem;
        font-size: 0.85rem;
        font-weight: 500;
        cursor: pointer;
        background: #2563eb;
        color: #fff;
        transition: opacity 120ms ease;
      }
      button.secondary {
        background: rgba(37, 99, 235, 0.12);
        color: #2563eb;
      }
      button:disabled {
        opacity: 0.4;
        cursor: not-allowed;
      }
      button:not(:disabled):hover {
        opacity: 0.8;
      }
      .board {
        display: flex;
        flex-direction: column;
        gap: 1rem;
      }
      .board h2 {
        margin: 0;
        font-size: 1.1rem;
      }
      .cards {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
        gap: 1rem;
      }
      .cards.compact {
        grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      }
      .card {
        border-radius: 14px;
        background: #fff;
        box-shadow: 0 8px 24px rgba(15, 23, 42, 0.08);
        padding: 1.1rem 1.3rem;
        display: flex;
        flex-direction: column;
        gap: 0.75rem;
        position: relative;
      }
      .card[data-depth="1"] {
        background: rgba(255, 255, 255, 0.96);
        box-shadow: 0 4px 12px rgba(15, 23, 42, 0.05);
      }
      .card[data-depth="2"] {
        background: rgba(255, 255, 255, 0.92);
        box-shadow: 0 2px 6px rgba(15, 23, 42, 0.04);
      }
      .child-arrow {
        color: #6b7c93;
        margin-right: 0.25em;
        font-weight: 400;
      }
      .expand-toggle {
        background: transparent;
        border: 0;
        cursor: pointer;
        font-family: inherit;
        font-size: 0.85em;
        color: #6b7c93;
        margin-right: 0.4em;
        padding: 0 0.2em;
        line-height: 1;
        user-select: none;
      }
      .expand-toggle:hover {
        color: #2563eb;
      }
      .child-count-badge {
        display: inline-block;
        background: #e0e7f0;
        color: #4a5568;
        font-size: 0.7em;
        font-weight: 500;
        padding: 0.1em 0.5em;
        border-radius: 9px;
        margin-left: 0.5em;
        vertical-align: middle;
      }
      .card-children {
        margin-top: 0.5rem;
        padding-top: 0.75rem;
        border-top: 1px dashed rgba(15, 23, 42, 0.12);
        display: flex;
        flex-direction: column;
        gap: 0.6rem;
      }
      .child-row {
        display: flex;
        flex-direction: column;
        gap: 0.25rem;
        padding: 0.4rem 0.6rem;
        background: rgba(15, 23, 42, 0.03);
        border-radius: 8px;
        border-left: 3px solid #94a3b8;
      }
      .child-row[data-status="update"] {
        border-left-color: #3b82f6;
      }
      .child-row[data-status="close"] {
        border-left-color: #10b981;
        opacity: 0.75;
      }
      .child-row[data-status="failed"], .child-row[data-status="error"] {
        border-left-color: #ef4444;
      }
      .child-row[data-status="stale"] {
        border-left-color: #f59e0b;
      }
      .child-name {
        font-size: 0.85em;
        font-weight: 500;
        color: #334155;
      }
      .child-bar {
        background: rgba(15, 23, 42, 0.08);
        border-radius: 4px;
        height: 6px;
        overflow: hidden;
      }
      .child-bar > .fill {
        height: 100%;
        background: #3b82f6;
        transition: width 0.2s ease-out;
      }
      .child-row[data-status="close"] .child-bar > .fill { background: #10b981; }
      .child-row[data-status="failed"] .child-bar > .fill { background: #ef4444; }
      .child-meta {
        display: flex;
        justify-content: space-between;
        font-size: 0.75em;
        color: #64748b;
        font-variant-numeric: tabular-nums;
      }
      .child-status {
        display: inline-block;
        font-size: 0.65em;
        padding: 0.05em 0.4em;
        border-radius: 4px;
        margin-left: 0.5em;
        background: #e2e8f0;
        color: #475569;
        text-transform: uppercase;
        letter-spacing: 0.04em;
        font-weight: 500;
      }
      .card h2 {
        margin: 0;
        font-size: 1rem;
        font-weight: 600;
        line-height: 1.4;
      }
      .card-header {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        gap: 0.5rem;
      }
      .card-actions {
        display: flex;
        gap: 0.25rem;
      }
      .card-action {
        border: none;
        background: rgba(15, 23, 42, 0.08);
        color: inherit;
        border-radius: 8px;
        padding: 0.3rem 0.55rem;
        font-size: 0.75rem;
        cursor: pointer;
      }
      .card-action:hover {
        background: rgba(37, 99, 235, 0.2);
      }
      .meta {
        display: flex;
        justify-content: space-between;
        font-size: 0.8rem;
        color: rgba(27, 31, 36, 0.7);
      }
      .badge {
        display: inline-flex;
        align-items: center;
        gap: 0.35rem;
        font-size: 0.75rem;
        background: rgba(37, 99, 235, 0.12);
        border-radius: 999px;
        padding: 0.2rem 0.65rem;
        text-transform: uppercase;
        letter-spacing: 0.05em;
      }
      .badge.stale {
        background: rgba(234, 179, 8, 0.18);
        color: #854d0e;
      }
      .badge.recovered {
        background: rgba(59, 130, 246, 0.18);
        color: #1d4ed8;
      }
      .badge.close {
        background: rgba(34, 197, 94, 0.16);
        color: #166534;
      }
      .bar {
        height: 12px;
        border-radius: 999px;
        background: rgba(56, 87, 146, 0.12);
        overflow: hidden;
      }
      .fill {
        height: 100%;
        width: 0;
        background: linear-gradient(90deg, #2563eb, #38bdf8);
        transition: width 200ms ease-in-out;
      }
      .card[data-status="close"] .fill {
        background: linear-gradient(90deg, #22c55e, #16a34a);
      }
      .card[data-status="error"] .fill {
        background: linear-gradient(90deg, #ef4444, #dc2626);
      }
      .card[data-status="stale"] .fill {
        background: linear-gradient(90deg, #facc15, #f97316);
      }
      .empty {
        margin-top: 0.5rem;
        font-size: 0.95rem;
        text-align: left;
        color: rgba(27, 31, 36, 0.6);
      }
      .more-note {
        font-size: 0.8rem;
        color: rgba(27, 31, 36, 0.55);
      }
      .history-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 1rem;
        flex-wrap: wrap;
      }
      #history-rows {
        display: flex;
        flex-direction: column;
        gap: 0.4rem;
      }
      .history-row {
        display: grid;
        grid-template-columns: minmax(0, 2fr) minmax(0, 1.2fr) auto auto auto;
        align-items: center;
        gap: 0.75rem;
        padding: 0.55rem 0.85rem;
        background: #fff;
        border-radius: 10px;
        box-shadow: 0 2px 6px rgba(15, 23, 42, 0.05);
        font-size: 0.85rem;
        font-variant-numeric: tabular-nums;
        border-left: 3px solid #94a3b8;
      }
      .history-row[data-status="close"]         { border-left-color: #10b981; }
      .history-row[data-status="error"],
      .history-row[data-status="failed"]        { border-left-color: #ef4444; }
      .history-row[data-status="stale-evicted"] { border-left-color: #f59e0b; }
      .history-name {
        font-weight: 500;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .history-name .desc {
        font-weight: 400;
        color: rgba(27, 31, 36, 0.6);
        margin-left: 0.4em;
      }
      .history-progress {
        color: rgba(27, 31, 36, 0.7);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .history-duration,
      .history-done-at {
        color: rgba(27, 31, 36, 0.6);
        font-size: 0.8rem;
        white-space: nowrap;
      }
      .history-row .badge {
        font-size: 0.65rem;
        padding: 0.15rem 0.55rem;
      }
      @media (max-width: 720px) {
        .history-row {
          grid-template-columns: 1fr auto;
          row-gap: 0.2rem;
        }
        .history-progress, .history-duration, .history-done-at { grid-column: 1 / -1; }
      }
      @media (prefers-color-scheme: dark) {
        .history-row {
          background: #111827;
          box-shadow: 0 2px 6px rgba(0, 0, 0, 0.3);
        }
        .history-name .desc, .history-progress,
        .history-duration, .history-done-at {
          color: rgba(226, 232, 240, 0.6);
        }
      }
      @media (prefers-color-scheme: dark) {
        :root {
          background: #0f172a;
          color: #e2e8f0;
        }
        .card {
          background: #111827;
          box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3);
        }
        .card-action {
          background: rgba(148, 163, 184, 0.2);
        }
        .card-action:hover {
          background: rgba(148, 163, 184, 0.35);
        }
        .meta {
          color: rgba(226, 232, 240, 0.7);
        }
        .bar {
          background: rgba(59, 130, 246, 0.2);
        }
        button.secondary {
          background: rgba(96, 165, 250, 0.18);
          color: #93c5fd;
        }
        .badge.stale {
          background: rgba(217, 119, 6, 0.35);
          color: #fef3c7;
        }
        .badge.recovered {
          background: rgba(96, 165, 250, 0.28);
          color: #dbeafe;
        }
        .badge.close {
          background: rgba(34, 197, 94, 0.3);
          color: #bbf7d0;
        }
      }
    </style>
  </head>
  <body>
    <header>
      <h1>Progressista Dashboard</h1>
      <span id="status">Connecting…</span>
    </header>
    <main>
      <section class="toolbar">
        <div class="toolbar-buttons">
          <button id="clear-completed" class="secondary" type="button">Clear completed</button>
          <button id="clear-stale" class="secondary" type="button">Clear stale</button>
          <button id="clear-recovered" class="secondary" type="button">Clear recovered</button>
        </div>
        <span id="counts" class="meta">—</span>
      </section>
      <section class="board">
        <h2>Active</h2>
        <div id="active-cards" class="cards"></div>
        <div id="active-empty" class="empty" hidden>No active tasks.</div>
      </section>
      <section class="board">
        <h2>Recovered</h2>
        <div id="recovered-cards" class="cards"></div>
        <div id="recovered-empty" class="empty" hidden>No recovered tasks.</div>
      </section>
      <section class="board">
        <h2>Needs Attention</h2>
        <div id="stale-cards" class="cards"></div>
        <div id="stale-empty" class="empty" hidden>No stale tasks.</div>
      </section>
      <section class="board">
        <h2>Completed</h2>
        <div id="completed-cards" class="cards compact"></div>
        <div id="completed-empty" class="empty" hidden>No completed tasks.</div>
        <div id="completed-extra" class="more-note" hidden></div>
      </section>
      <section class="board" id="history-board">
        <div class="history-header">
          <h2>History <span id="history-count" class="more-note"></span></h2>
          <div class="toolbar-buttons">
            <button id="history-load" class="secondary" type="button">Show history</button>
            <button id="history-refresh" class="secondary" type="button" hidden>Refresh</button>
          </div>
        </div>
        <div id="history-rows"></div>
        <div id="history-empty" class="empty" hidden>No completed runs in history yet.</div>
        <div class="toolbar" id="history-more-row" hidden>
          <button id="history-more" class="secondary" type="button">Load more</button>
          <span id="history-status" class="more-note"></span>
        </div>
      </section>
    </main>
    <script type="module">
      const statusEl = document.getElementById("status");
      const countsEl = document.getElementById("counts");
      const activeCards = document.getElementById("active-cards");
      const recoveredCards = document.getElementById("recovered-cards");
      const staleCards = document.getElementById("stale-cards");
      const completedCards = document.getElementById("completed-cards");
      const empties = {
        active: document.getElementById("active-empty"),
        recovered: document.getElementById("recovered-empty"),
        stale: document.getElementById("stale-empty"),
        completed: document.getElementById("completed-empty"),
      };
      const completedExtra = document.getElementById("completed-extra");
      const clearCompletedBtn = document.getElementById("clear-completed");
      const clearStaleBtn = document.getElementById("clear-stale");
      const clearRecoveredBtn = document.getElementById("clear-recovered");

      const protocol = window.location.protocol === "https:" ? "wss" : "ws";
      const endpoint = `${protocol}://${window.location.host}/ws`;
      const params = new URLSearchParams(window.location.search);
      const token = params.get("token");
      const wsUrl = token ? `${endpoint}?token=${encodeURIComponent(token)}` : endpoint;
      const ws = new WebSocket(wsUrl);

      const API_BASE = `${window.location.protocol}//${window.location.host}`;

      ws.addEventListener("open", () => {
        statusEl.textContent = "Connected";
      });

      ws.addEventListener("close", () => {
        statusEl.textContent = "Disconnected — retry in 5s";
        setTimeout(() => window.location.reload(), 5000);
      });

      ws.addEventListener("message", (event) => {
        try {
          const payload = JSON.parse(event.data);
          render(payload.tasks || {});
        } catch (err) {
          console.error("Failed to parse message", err);
        }
      });

      async function apiDelete(path, search = new URLSearchParams()) {
        if (token) {
          search.set("token", token);
        }
        const query = search.toString();
        const url = query ? `${API_BASE}${path}?${query}` : `${API_BASE}${path}`;
        const res = await fetch(url, { method: "DELETE", credentials: "same-origin" });
        if (!res.ok) {
          throw new Error(`Request failed: ${res.status}`);
        }
        return res.json().catch(() => ({}));
      }

      async function deleteTask(taskId) {
        // Cascading delete: collect descendants from window.__lastTasks and
        // remove them too. Otherwise discarding a parent leaves orphan child
        // cards on the dashboard.
        const tasks = window.__lastTasks || {};
        const descendants = [];
        const stack = [taskId];
        const seen = new Set([taskId]);
        while (stack.length) {
          const current = stack.shift();
          for (const [tid, t] of Object.entries(tasks)) {
            const pid = t && t.meta && t.meta.parent_id;
            if (pid === current && !seen.has(tid)) {
              seen.add(tid);
              descendants.push(tid);
              stack.push(tid);
            }
          }
        }
        try {
          // delete children first so they don't reorphan into top-level briefly
          for (const tid of descendants) {
            await apiDelete(`/tasks/${encodeURIComponent(tid)}`);
          }
          await apiDelete(`/tasks/${encodeURIComponent(taskId)}`);
        } catch (err) {
          console.error("Failed to delete task", err);
        }
      }

      async function clearStatus(status) {
        try {
          const search = new URLSearchParams();
          search.set("status", status);
          await apiDelete("/tasks", search);
        } catch (err) {
          console.error("Failed to clear tasks", err);
        }
      }

      clearCompletedBtn.addEventListener("click", () => clearStatus("close"));
      clearStaleBtn.addEventListener("click", () => clearStatus("stale"));
      clearRecoveredBtn.addEventListener("click", () => clearStatus("recovered"));

      // -------- History (sqlite-backed completed runs) ----------------------
      const historyBoard = document.getElementById("history-board");
      const historyRows = document.getElementById("history-rows");
      const historyEmpty = document.getElementById("history-empty");
      const historyLoadBtn = document.getElementById("history-load");
      const historyRefreshBtn = document.getElementById("history-refresh");
      const historyMoreRow = document.getElementById("history-more-row");
      const historyMoreBtn = document.getElementById("history-more");
      const historyStatusEl = document.getElementById("history-status");
      const historyCountEl = document.getElementById("history-count");
      const PAGE_SIZE = 50;
      let historyOldestId = null;          // id of last fetched row, used as `before` cursor
      let historyExhausted = false;
      let historyLoading = false;

      async function fetchHistory(before) {
        const search = new URLSearchParams();
        search.set("limit", String(PAGE_SIZE));
        if (before !== null && before !== undefined) search.set("before", String(before));
        if (token) search.set("token", token);
        const url = `${API_BASE}/history?${search.toString()}`;
        const res = await fetch(url, { credentials: "same-origin" });
        if (!res.ok) throw new Error(`history request failed: ${res.status}`);
        return res.json();
      }

      async function fetchHistoryStats() {
        const search = new URLSearchParams();
        if (token) search.set("token", token);
        const q = search.toString();
        const url = q ? `${API_BASE}/history/stats?${q}` : `${API_BASE}/history/stats`;
        try {
          const res = await fetch(url, { credentials: "same-origin" });
          if (!res.ok) return null;
          return await res.json();
        } catch (err) {
          console.error("history stats failed", err);
          return null;
        }
      }

      function renderHistoryRow(run) {
        const status = run.status || "close";
        const desc = run.desc ? `<span class="desc">— ${escapeHtml(run.desc)}</span>` : "";
        const total = (run.total !== null && run.total !== undefined) ? run.total : "∞";
        const n = run.n_final ?? 0;
        const pct = (typeof run.total === "number" && run.total > 0)
          ? Math.min(100, (n / run.total) * 100).toFixed(0) + "%" : "—";
        const unit = run.unit || "";
        const duration = formatDuration(run.duration_s || 0);
        const doneAt = run.done_at ? formatHHMMSS(run.done_at) : "";
        const doneDate = run.done_at
          ? new Date(run.done_at * 1000).toLocaleDateString([], { year: "numeric", month: "2-digit", day: "2-digit" })
          : "";
        return `
          <div class="history-row" data-status="${status}" data-id="${run.id}">
            <div class="history-name">${escapeHtml(run.task_id || "?")}${desc}</div>
            <div class="history-progress">${n} / ${total} ${escapeHtml(unit)} · ${pct}</div>
            <div class="history-duration">${duration}</div>
            <div class="history-done-at">${doneDate} ${doneAt}</div>
            <div class="history-actions">
              <span class="badge ${status === "close" ? "close" : status === "stale-evicted" ? "stale" : ""}">${status}</span>
              <button class="card-action" data-action="history-delete" data-id="${run.id}">Delete</button>
            </div>
          </div>
        `;
      }

      function escapeHtml(s) {
        if (s === null || s === undefined) return "";
        return String(s).replace(/[&<>"']/g, (c) => ({
          "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;"
        }[c]));
      }

      async function loadHistory(append) {
        if (historyLoading) return;
        historyLoading = true;
        historyStatusEl.textContent = "loading...";
        try {
          const before = append ? historyOldestId : null;
          const payload = await fetchHistory(before);
          if (!payload.enabled) {
            historyEmpty.hidden = false;
            historyEmpty.textContent = "History backend disabled (set PROGRESSISTA_HISTORY_DB_PATH or PROGRESSISTA_STORAGE_PATH).";
            historyMoreRow.hidden = true;
            historyLoadBtn.hidden = true;
            historyRefreshBtn.hidden = true;
            return;
          }
          const runs = payload.runs || [];
          if (!append) {
            historyRows.innerHTML = "";
            historyOldestId = null;
            historyExhausted = false;
          }
          if (runs.length === 0 && !append) {
            historyEmpty.hidden = false;
            historyEmpty.textContent = "No completed runs in history yet.";
            historyMoreRow.hidden = true;
          } else {
            historyEmpty.hidden = true;
            historyRows.insertAdjacentHTML("beforeend", runs.map(renderHistoryRow).join(""));
            if (runs.length > 0) {
              historyOldestId = runs[runs.length - 1].id;
            }
            if (runs.length < PAGE_SIZE) {
              historyExhausted = true;
              historyMoreRow.hidden = true;
            } else {
              historyMoreRow.hidden = false;
            }
          }
          historyLoadBtn.hidden = true;
          historyRefreshBtn.hidden = false;
          const stats = await fetchHistoryStats();
          if (stats && stats.enabled) {
            historyCountEl.textContent = `(${stats.total} run${stats.total === 1 ? "" : "s"})`;
          }
        } catch (err) {
          console.error("history load failed", err);
          historyStatusEl.textContent = "load failed";
          return;
        } finally {
          historyLoading = false;
          historyStatusEl.textContent = historyExhausted ? "all loaded" : "";
        }
      }

      historyLoadBtn.addEventListener("click", () => loadHistory(false));
      historyRefreshBtn.addEventListener("click", () => loadHistory(false));
      historyMoreBtn.addEventListener("click", () => loadHistory(true));

      document.addEventListener("click", async (event) => {
        const btn = event.target.closest('button[data-action="history-delete"]');
        if (!btn) return;
        const id = btn.dataset.id;
        if (!id) return;
        try {
          await apiDelete(`/history/${encodeURIComponent(id)}`);
          const row = btn.closest(".history-row");
          if (row) row.remove();
          const stats = await fetchHistoryStats();
          if (stats && stats.enabled) {
            historyCountEl.textContent = `(${stats.total} run${stats.total === 1 ? "" : "s"})`;
          }
        } catch (err) {
          console.error("history delete failed", err);
        }
      });

      document.addEventListener("click", (event) => {
        const action = event.target.closest("button[data-action]");
        if (!action) return;
        const taskId = action.dataset.id;
        if (action.dataset.action === "discard" && taskId) {
          deleteTask(taskId);
        } else if (action.dataset.action === "toggle-children" && taskId) {
          toggleParent(taskId);
        }
      });

      function render(tasks) {
        // cache for toggle handler so it can re-render without waiting for ws
        window.__lastTasks = tasks;
        recordSamples(tasks);
        const entries = Object.values(tasks)
          .map((task) => ({
            ...task,
            progress:
              typeof task.total === "number" && task.total > 0
                ? Math.min(100, (task.n || 0) / task.total * 100)
                : 0,
          }))
          .sort((a, b) => (b.updated_at || 0) - (a.updated_at || 0));

        const buckets = {
          active: [],
          recovered: [],
          stale: [],
          completed: [],
        };

        // Children get bucketed alongside their parent so an outer loop's
        // completed inner iterations don't surface as separate cards in the
        // Completed section. Pre-compute parent task locations so we can
        // route children to the same bucket.
        const taskById = new Map(entries.map((t) => [t.task_id, t]));
        const bucketFor = (task) => {
          if (task.status === "close") return "completed";
          if (task.status === "recovered") return "recovered";
          if (task.status === "stale" || task.status === "failed" || task.status === "error") return "stale";
          return "active";
        };
        const parentBucket = (task) => {
          // walk up parent chain to find the topmost ancestor's natural bucket
          let cur = task, hops = 0;
          while (hops++ < 16) {
            const pid = parentIdOf(cur);
            if (!pid) break;
            const parent = taskById.get(pid);
            if (!parent) break;
            cur = parent;
          }
          return bucketFor(cur);
        };

        for (const task of entries) {
          const pid = parentIdOf(task);
          // child whose parent is visible: route to parent's bucket
          if (pid && taskById.has(pid)) {
            buckets[parentBucket(task)].push(task);
          } else {
            buckets[bucketFor(task)].push(task);
          }
        }

        renderBucket(activeCards, "active", buckets.active);
        renderBucket(recoveredCards, "recovered", buckets.recovered);
        renderBucket(staleCards, "stale", buckets.stale);
        renderCompleted(buckets.completed);

        countsEl.textContent = `Active ${buckets.active.length} • Recovered ${buckets.recovered.length} • Stale ${buckets.stale.length} • Completed ${buckets.completed.length}`;
        clearCompletedBtn.disabled = buckets.completed.length === 0;
        clearStaleBtn.disabled = buckets.stale.length === 0;
        clearRecoveredBtn.disabled = buckets.recovered.length === 0;
      }

      function parentIdOf(task) {
        // Children declare their parent via meta.parent_id (set at create time).
        // Returns null if no parent or the parent_id is not a visible task.
        const pid = task && task.meta && task.meta.parent_id;
        return (pid && typeof pid === "string") ? pid : null;
      }

      // Per-page expand state: parent_task_id -> bool. Cleared on reload.
      // Default: collapsed. Stored on window so re-renders preserve it.
      window.__expandedParents = window.__expandedParents || new Set();

      function toggleParent(taskId) {
        if (window.__expandedParents.has(taskId)) {
          window.__expandedParents.delete(taskId);
        } else {
          window.__expandedParents.add(taskId);
        }
        // trigger immediate re-render with last-known data
        if (window.__lastTasks) render(window.__lastTasks);
      }

      function renderChildRow(task) {
        const pct = (task.progress || 0).toFixed(1);
        const status = task.status || "update";
        const desc = task.desc ? ` — ${task.desc}` : "";
        const current = task.n ?? 0;
        const total = task.total ?? "∞";
        const unit = task.unit || "";
        const elapsed = task.created_at && task.updated_at
          ? formatDuration(task.updated_at - task.created_at) : "-";
        const etaSec = computeEta(task);
        const eta2Sec = computeEta2(task);
        const finishAt = etaSec !== null ? formatClockTime((task.updated_at || 0) + etaSec, task.created_at) : "";
        const finishAt2 = eta2Sec !== null ? formatClockTime((task.updated_at || 0) + eta2Sec, task.created_at) : "";
        const eta2Str = eta2Sec !== null ? ` · ETA² ${formatDuration(eta2Sec)}${finishAt2 ? ` (${finishAt2})` : ""}` : "";
        const eta = etaSec !== null ? ` · ETA ${formatDuration(etaSec)}${finishAt ? ` (${finishAt})` : ""}${eta2Str}` : "";
        const badge = status !== "update"
          ? `<span class="child-status status-${status}">${status}</span>` : "";
        return `
          <div class="child-row" data-status="${status}">
            <div class="child-name">${task.task_id}${desc} ${badge}</div>
            <div class="child-bar"><div class="fill" style="width:${pct}%"></div></div>
            <div class="child-meta">
              <span>${current} / ${total} ${unit}</span>
              <span>${pct}% · ${elapsed}${eta}</span>
            </div>
          </div>
        `;
      }

      function renderTreeCards(list) {
        // Group children by parent_id. Children render INSIDE the parent's
        // own article element (not as separate cards), shown only when the
        // parent is expanded. Click parent's toggle to reveal/hide.
        const idSet = new Set(list.map((t) => t.task_id));
        const childrenOf = new Map();  // parent_id -> [child]
        const topLevel = [];
        for (const t of list) {
          const pid = parentIdOf(t);
          if (pid && idSet.has(pid)) {
            if (!childrenOf.has(pid)) childrenOf.set(pid, []);
            childrenOf.get(pid).push(t);
          } else {
            topLevel.push(t);
          }
        }
        const out = [];
        for (const t of topLevel) {
          const kids = childrenOf.get(t.task_id) || [];
          const expanded = window.__expandedParents.has(t.task_id);
          // Sort children based on parent state:
          //  - parent still running: latest activity on top, where activity =
          //    max(created_at, updated_at). Using max picks up freshly spawned
          //    children even before their first progress update arrives, while
          //    still floating up actively-ticking older children.
          //  - parent finished: earliest first (chronological history view)
          const parentDone = t.status === "close" || t.status === "failed" || t.status === "error";
          const activityKey = (x) => Math.max(x.created_at || 0, x.updated_at || 0);
          if (parentDone) {
            kids.sort((a, b) => (a.created_at || 0) - (b.created_at || 0));
          } else {
            kids.sort((a, b) => activityKey(b) - activityKey(a));
          }
          // Visibility rules:
          //  - expanded: all children
          //  - collapsed + parent running: preview just the most recent child
          //    (first in DESC-by-activity sort) so the user sees current progress
          //    of the inner loop without expanding
          //  - collapsed + parent done: hide all (clean history view)
          let visibleKids = [];
          if (kids.length > 0) {
            if (expanded) visibleKids = kids;
            else if (!parentDone) visibleKids = kids.slice(0, 1);
          }
          const childrenHtml = visibleKids.length > 0
            ? `<div class="card-children">${visibleKids.map(renderChildRow).join("")}</div>`
            : "";
          out.push(renderCard(t, 0, {
            hasChildren: kids.length > 0,
            expanded,
            childCount: kids.length,
            childrenHtml,
          }));
        }
        return out.join("");
      }

      function renderBucket(container, name, list) {
        const emptyEl = empties[name];
        if (!list.length) {
          container.innerHTML = "";
          emptyEl.hidden = false;
          return;
        }
        emptyEl.hidden = true;
        container.innerHTML = renderTreeCards(list);
      }

      function renderCompleted(list) {
        const emptyEl = empties.completed;
        if (!list.length) {
          completedCards.innerHTML = "";
          emptyEl.hidden = false;
          completedExtra.hidden = true;
          return;
        }
        emptyEl.hidden = true;
        const limit = 6;
        const visible = list.slice(0, limit);
        completedCards.innerHTML = renderTreeCards(visible);
        const remaining = list.length - visible.length;
        if (remaining > 0) {
          completedExtra.hidden = false;
          completedExtra.textContent = `+ ${remaining} more completed task${remaining === 1 ? "" : "s"} — clear or discard to hide`;
        } else {
          completedExtra.hidden = true;
        }
      }

      function formatDuration(seconds) {
        // Picks top two adjacent units. Abbreviations: s, m(in), h, d, w,
        // m(onth), y, c. Minute and month both render as "m" per request -
        // context (the neighbouring unit) disambiguates: "5m30s" = minutes,
        // "5m2w" = months.
        if (!isFinite(seconds) || seconds < 0) return "-";
        seconds = Math.round(seconds);
        const MIN = 60, HOUR = 3600, DAY = 86400, WEEK = 7 * DAY;
        const MONTH = 30 * DAY, YEAR = 365 * DAY, CENTURY = 100 * YEAR;
        if (seconds < MIN) return `${seconds}s`;
        if (seconds < HOUR) {
          const m = Math.floor(seconds / MIN);
          const s = seconds % MIN;
          return `${m}m${String(s).padStart(2, "0")}s`;
        }
        if (seconds < DAY) {
          const h = Math.floor(seconds / HOUR);
          const m = Math.floor((seconds % HOUR) / MIN);
          return `${h}h${String(m).padStart(2, "0")}m`;
        }
        if (seconds < WEEK) {
          const d = Math.floor(seconds / DAY);
          const h = Math.floor((seconds % DAY) / HOUR);
          return `${d}d${String(h).padStart(2, "0")}h`;
        }
        if (seconds < MONTH) {
          const w = Math.floor(seconds / WEEK);
          const d = Math.floor((seconds % WEEK) / DAY);
          return `${w}w${d}d`;
        }
        if (seconds < YEAR) {
          const mo = Math.floor(seconds / MONTH);
          const w = Math.floor((seconds % MONTH) / WEEK);
          return `${mo}m${w}w`;
        }
        if (seconds < CENTURY) {
          const y = Math.floor(seconds / YEAR);
          const mo = Math.floor((seconds % YEAR) / MONTH);
          return `${y}y${mo}m`;
        }
        const c = Math.floor(seconds / CENTURY);
        const y = Math.floor((seconds % CENTURY) / YEAR);
        return `${c}c${y}y`;
      }

      function formatHHMMSS(unixSec) {
        if (!isFinite(unixSec) || unixSec <= 0) return "";
        const d = new Date(unixSec * 1000);
        const hh = String(d.getHours()).padStart(2, "0");
        const mm = String(d.getMinutes()).padStart(2, "0");
        const ss = String(d.getSeconds()).padStart(2, "0");
        return `${hh}:${mm}:${ss}`;
      }

      function formatClockTime(unixSec, refSec) {
        if (!isFinite(unixSec) || unixSec <= 0) return "";
        const d = new Date(unixSec * 1000);
        const ref = isFinite(refSec) && refSec > 0 ? new Date(refSec * 1000) : new Date();
        const sameDay = d.getFullYear() === ref.getFullYear()
          && d.getMonth() === ref.getMonth()
          && d.getDate() === ref.getDate();
        const hh = String(d.getHours()).padStart(2, "0");
        const mm = String(d.getMinutes()).padStart(2, "0");
        const hhmm = `${hh}:${mm}`;
        if (sameDay) return hhmm;
        const ymd = `${d.getFullYear()}/${String(d.getMonth() + 1).padStart(2, "0")}/${String(d.getDate()).padStart(2, "0")}`;
        return `${hhmm} ${ymd}`;
      }

      function computeEta(task) {
        // Rate is "work done since this run began", not "n divided by
        // elapsed". A task that resumes from n=N (e.g. download restarting
        // at byte 100MB) has tiny elapsed but big n - using n directly
        // overestimates rate by ~N× and collapses ETA to nothing.
        if (task.status !== "update") return null;
        if (!task.total || task.total <= 0) return null;
        const nStart = task.n_start || 0;
        const work = (task.n || 0) - nStart;
        if (work <= 0) return null;
        const elapsed = (task.updated_at || 0) - (task.created_at || 0);
        if (elapsed <= 0) return null;
        const rate = work / elapsed;
        if (rate <= 0) return null;
        const remaining = (task.total - task.n) / rate;
        return remaining;
      }

      // ---------- ETA² (quadratic fit on cumulative time vs n) -------------
      // Stores per-task time series of (n, elapsed_since_created) samples so
      // we can fit t(n) = a*x² + b*x + c with x=n/total. Predicting at x=1
      // gives a curve-aware ETA that diverges from the linear one when the
      // task is accelerating or decelerating. Capped FIFO at SAMPLE_CAP.
      const SAMPLE_CAP = 200;
      const ETA2_MIN_SAMPLES = 8;
      window.__samples = window.__samples || new Map();

      function recordSamples(tasks) {
        const liveIds = new Set();
        for (const task of Object.values(tasks)) {
          if (!task.task_id) continue;
          liveIds.add(task.task_id);
          if (task.status !== "update") {
            // Drop history for non-running tasks so a re-run starts fresh.
            window.__samples.delete(task.task_id);
            continue;
          }
          if (typeof task.n !== "number" || task.n <= 0) continue;
          if (!task.created_at || !task.updated_at) continue;
          const elapsed = task.updated_at - task.created_at;
          if (elapsed <= 0) continue;
          let arr = window.__samples.get(task.task_id);
          if (!arr) {
            arr = [];
            window.__samples.set(task.task_id, arr);
          }
          const last = arr[arr.length - 1];
          if (last && last.n === task.n && last.t === elapsed) continue;
          arr.push({ n: task.n, t: elapsed });
          if (arr.length > SAMPLE_CAP) arr.splice(0, arr.length - SAMPLE_CAP);
        }
        // Evict samples for tasks that are no longer in the snapshot.
        for (const tid of [...window.__samples.keys()]) {
          if (!liveIds.has(tid)) window.__samples.delete(tid);
        }
      }

      function computeEta2(task) {
        if (task.status !== "update") return null;
        if (!task.total || task.total <= 0) return null;
        const nStart = task.n_start || 0;
        const span = task.total - nStart;
        if (span <= 0) return null;
        if (!task.n || task.n <= nStart || task.n >= task.total) return null;
        const arr = window.__samples.get(task.task_id);
        if (!arr || arr.length < ETA2_MIN_SAMPLES) return null;
        // Fit t = a*x² + b*x + c with x = (n - n_start) / (total - n_start).
        // Keeping x in [0,1] over actual work span both bounds the n² / n⁴
        // moments and re-anchors the parabola at this run's start, so a
        // resumed task fits the same shape as one that started at zero.
        let s0 = 0, s1 = 0, s2 = 0, s3 = 0, s4 = 0;
        let st = 0, sxt = 0, sx2t = 0;
        for (const sample of arr) {
          const x = (sample.n - nStart) / span;
          const t = sample.t;
          const x2 = x * x, x3 = x2 * x, x4 = x2 * x2;
          s0 += 1;  s1 += x;  s2 += x2;  s3 += x3;  s4 += x4;
          st += t;  sxt += x * t;  sx2t += x2 * t;
        }
        const M = [[s0, s1, s2], [s1, s2, s3], [s2, s3, s4]];
        const sol = solve3(M, [st, sxt, sx2t]);
        if (!sol) return null;
        const [c, b, a] = sol;
        // Predict cumulative elapsed at x=1 (i.e. n=total). Coefficients sum.
        const predicted = a + b + c;
        if (!isFinite(predicted)) return null;
        const currentElapsed = task.updated_at - task.created_at;
        const remaining = predicted - currentElapsed;
        if (!isFinite(remaining) || remaining < 0) return null;
        return remaining;
      }

      function solve3(M, rhs) {
        // Cramer's rule on a 3x3 system. Cheap, no deps, fine for our size.
        const det = (m) =>
            m[0][0] * (m[1][1] * m[2][2] - m[1][2] * m[2][1])
          - m[0][1] * (m[1][0] * m[2][2] - m[1][2] * m[2][0])
          + m[0][2] * (m[1][0] * m[2][1] - m[1][1] * m[2][0]);
        const D = det(M);
        if (!isFinite(D) || Math.abs(D) < 1e-14) return null;
        const sub = (col) => M.map((row, i) => row.map((v, j) => j === col ? rhs[i] : v));
        const x = det(sub(0)) / D;
        const y = det(sub(1)) / D;
        const z = det(sub(2)) / D;
        if (![x, y, z].every(isFinite)) return null;
        return [x, y, z];
      }

      function renderCard(task, depth = 0, opts = {}) {
        const { hasChildren = false, expanded = false, childCount = 0, childrenHtml = "" } = opts;
        const status = task.status || "update";
        const desc = task.desc ? ` — ${task.desc}` : "";
        const unit = task.unit || "";
        const total = task.total ?? "∞";
        const current = task.n ?? 0;
        const pct = task.progress.toFixed(1);
        const updated = task.updated_at ? formatHHMMSS(task.updated_at) : "";
        const elapsed = task.created_at && task.updated_at
          ? formatDuration(task.updated_at - task.created_at)
          : "-";
        const etaSec = computeEta(task);
        const eta2Sec = computeEta2(task);
        const eta = etaSec !== null ? formatDuration(etaSec) : "-";
        const eta2 = eta2Sec !== null ? formatDuration(eta2Sec) : "";
        const finishAt = etaSec !== null ? formatClockTime((task.updated_at || 0) + etaSec, task.created_at) : "";
        const finishAt2 = eta2Sec !== null ? formatClockTime((task.updated_at || 0) + eta2Sec, task.created_at) : "";
        const badgeClass =
          status === "close"
            ? "close"
            : status === "stale"
            ? "stale"
            : status === "recovered"
            ? "recovered"
            : "";
        const indentStyle = depth > 0
          ? `margin-left:${depth * 1.5}rem; border-left: 2px solid #2a4a6a;`
          : "";
        const childPrefix = depth > 0 ? '<span class="child-arrow">↳ </span>' : "";
        const expandToggle = hasChildren
          ? `<button class="expand-toggle" data-action="toggle-children" data-id="${task.task_id}" title="${expanded ? "collapse" : "expand"} ${childCount} child${childCount === 1 ? "" : "ren"}">${expanded ? "▼" : "▶"}</button>`
          : "";
        const childCountBadge = hasChildren && !expanded
          ? `<span class="child-count-badge">${childCount}</span>`
          : "";
        return `
          <article class="card" data-status="${status}" data-depth="${depth}" style="${indentStyle}">
            <div class="card-header">
              <h2>${expandToggle}${childPrefix}${task.task_id}${desc}${childCountBadge}</h2>
              <div class="card-actions">
                <span class="badge ${badgeClass}">${status}</span>
                <button class="card-action" data-action="discard" data-id="${task.task_id}">Discard</button>
              </div>
            </div>
            <div class="bar">
              <div class="fill" style="width:${pct}%"></div>
            </div>
            <div class="meta">
              <span>${current} / ${total} ${unit}</span>
              <span>${pct}%</span>
            </div>
            <div class="meta">
              <span>Elapsed ${elapsed} ${etaSec !== null ? `· ETA ${eta}${finishAt ? ` (${finishAt})` : ""}${eta2 ? ` · ETA² ${eta2}${finishAt2 ? ` (${finishAt2})` : ""}` : ""}` : ""}</span>
              <span>Updated ${updated || "—"}</span>
            </div>
            <div class="meta">
              <span>${task.created_at ? `Started ${formatHHMMSS(task.created_at)}` : ""}</span>
            </div>
            ${childrenHtml}
          </article>
        `;
      }
    </script>
  </body>
</html>
